<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
  <!-- Bezel (filled rectangle = the physical frame, 1px border) -->
  <rect x="2" y="1" width="12" height="14" fill="#6C707E"/>
  <!-- Recessed screen area (dark, inset 1px from bezel) -->
  <rect x="3" y="2" width="10" height="12" fill="#2B2D30"/>
  <!-- Title bar strip (lighter, top of screen) -->
  <rect x="3" y="2" width="10" height="2" fill="#4E5157"/>
  <!-- Prompt: '>' chevron -->
  <path d="M5 10L6 11L5 12" stroke="#6C707E" stroke-width="1" stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Cursor: '_' underscore -->
  <line x1="8" y1="12" x2="11" y2="12" stroke="#6C707E" stroke-width="1" stroke-linecap="square"/>
</svg>
