<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
  <!-- Bezel (1px border) -->
  <rect x="2" y="1" width="12" height="14" fill="#CED0D6"/>
  <!-- Recessed screen area (inset 1px from bezel) -->
  <rect x="3" y="2" width="10" height="12" fill="#1E1F22"/>
  <!-- Title bar strip -->
  <rect x="3" y="2" width="10" height="2" fill="#43454A"/>
  <!-- Prompt: '>' chevron -->
  <path d="M5 10L6 11L5 12" stroke="#CED0D6" stroke-width="1" stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Cursor: '_' underscore -->
  <line x1="8" y1="12" x2="11" y2="12" stroke="#CED0D6" stroke-width="1" stroke-linecap="square"/>
</svg>
